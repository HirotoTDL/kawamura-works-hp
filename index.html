  <!-- Inlined global state so the page works even if js/state.js can't be served. -->
  <script>
  window.KW = window.KW || {};
  window.KW.TWEAKS = {"heroVariant":"invisible","language":"jp","animationSpeed":1};
  window.KW.listeners = new Set();
  window.KW.setTweak = function(key, value){
    window.KW.TWEAKS[key] = value;
    window.KW.listeners.forEach(fn => fn(window.KW.TWEAKS));
  };
  window.KW.subscribe = function(fn){
    window.KW.listeners.add(fn);
    return () => window.KW.listeners.delete(fn);
  };
  (function(){
    const glow = document.getElementById('cursor-glow'); if(!glow) return;
    let raf, tx=0, ty=0, x=0, y=0;
    document.addEventListener('mousemove', e => {
      tx=e.clientX; ty=e.clientY; document.body.classList.add('cursor-active');
      if(!raf) raf = requestAnimationFrame(tick);
    });
    document.addEventListener('mouseleave', () => document.body.classList.remove('cursor-active'));
    function tick(){
      x += (tx-x)*0.18; y += (ty-y)*0.18;
      glow.style.transform = `translate(${x}px,${y}px) translate(-50%,-50%)`;
      if(Math.abs(tx-x)>0.5 || Math.abs(ty-y)>0.5){ raf=requestAnimationFrame(tick);} else raf=null;
    }
  })();
  window.KW.observeReveal = function(root){
    const els = (root || document).querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
    }, {threshold:0.12, rootMargin:'0px 0px -40px 0px'});
    els.forEach(el => io.observe(el));
  };
  setTimeout(() => window.KW.observeReveal(), 100);
  setInterval(() => window.KW.observeReveal(), 1500);
  </script>

  <!-- Mobile drawer menu (hamburger) -->
  <script>
  (function(){
    const btn = document.getElementById('navBurgerBtn');
    const drawer = document.getElementById('navDrawer');
    if(!btn || !drawer) return;
    function setOpen(open){
      document.body.classList.toggle('nav-open', open);
      btn.setAttribute('aria-expanded', String(open));
      drawer.setAttribute('aria-hidden', String(!open));
    }
    btn.addEventListener('click', () => {
      setOpen(!document.body.classList.contains('nav-open'));
    });
    // Close when any link inside the drawer is clicked.
    drawer.addEventListener('click', e => {
      if(e.target.closest('a')) setOpen(false);
    });
    // Esc closes.
    document.addEventListener('keydown', e => {
      if(e.key === 'Escape' && document.body.classList.contains('nav-open')) setOpen(false);
    });
    // Auto-close if the viewport grows back to desktop.
    const mql = window.matchMedia('(min-width: 861px)');
    (mql.addEventListener || mql.addListener).call(mql, 'change', (ev) => {
      if((ev.matches ?? mql.matches) && document.body.classList.contains('nav-open')) setOpen(false);
    });
  })();
  </script>

  <!-- Inlined language toggle -->
  <script>
  (function(){
    function applyLang(){
      const en = window.KW.TWEAKS.language === 'en';
      document.body.classList.toggle('lang-en', en);
      document.querySelectorAll('[data-jp]').forEach(el => {
        const jp = el.getAttribute('data-jp');
        const enT = el.getAttribute('data-en');
        if(enT) el.textContent = en ? enT : jp;
      });
    }
    document.addEventListener('click', e => {
      const btn = e.target.closest('#langBtn'); if(!btn) return;
      window.KW.setTweak('language', window.KW.TWEAKS.language === 'en' ? 'jp' : 'en');
    });
    window.KW.subscribe(applyLang);
    setTimeout(applyLang, 200);
    setTimeout(applyLang, 1000);
    setTimeout(applyLang, 2500);
  })();
  </script>
